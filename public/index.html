<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 3 1B LiteRT Model Server</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }
        .status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            border-left: 4px solid;
        }
        .status.success { background-color: #d4edda; border-color: #28a745; color: #155724; }
        .status.error { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        .status.info { background-color: #d1ecf1; border-color: #17a2b8; color: #0c5460; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #545b62; }
        #modelInfo, #status {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f8f9fa;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Gemma 3 1B LiteRT Model Server</h1>
        <p>Deployed on Vercel with Supabase model storage</p>
    </div>

    <div id="status" class="status info">
        Checking server status...
    </div>

    <div>
        <button class="btn" onclick="checkHealth()">Check Health</a>
        <button class="btn btn-secondary" onclick="getModelInfo()">Get Model Info</button>
        <button class="btn" onclick="testModel()">Test Model (Placeholder)</button>
    </div>

    <div id="modelInfo">
        <h3>Model Information</h3>
        <p>Loading model information></p>
    </div>

    <script>
        const API_BASE = '';

        async function checkHealth() {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status info';
            statusEl.textContent = 'Checking health...';
            
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();
                
                if (response.ok) {
                    statusEl.className = 'status success';
                    statusEl.textContent = `Server is healthy - ${new Date(data.timestamp).toLocaleString()}`;
                } else {
                    statusEl.className = 'status error';
                    statusEl.textContent = `Health check failed: ${response.status}`;
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = `Health check failed: ${error.message}`;
            }
        }

        async function getModelInfo() {
            const infoEl = document.getElementById('modelInfo');
            infoEl.innerHTML = '<p>Loading model information...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/api/model/info`);
                const data = await response.json();
                
                if (response.ok) {
                    infoEl.innerHTML = `
                        <p><strong>Name:</strong> ${data.name}</p>
                        <p><strong>Type:</strong> ${data.type}</p>
                        <p><strong>Source:</strong> ${data.source}</p>
                        <p><strong>Endpoint:</strong> <code>${data.endpoint}</code></p>
                    `;
                } else {
                    infoEl.innerHTML = `<p>Error loading model info: ${response.status}</p>`;
                }
            } catch (error) {
                infoEl.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }

        async function testModel() {
            const infoEl = document.getElementById('modelInfo');
            infoEl.innerHTML = '<p>Testing model access...</p>';
            
            try {
                // Try to access the model file
                const response = await fetch(`${API_BASE}/models/gemma3-1b-it-int4.litertlm`, {
                    method: 'HEAD'
                });
                
                if (response.ok) {
                    const size = response.headers.get('content-length');
                    infoEl.innerHTML = `
                        <p>Model accessible! Size: ${(size / (1024*1024)).toFixed(2)} MB</p>
                        <p><em>Note: Actual model inference would require a LiteRT runtime</em></p>
                    `;
                } else {
                    infoEl.innerHTML = `<p>Model access failed: ${response.status}</p>`;
                }
            } catch (error) {
                infoEl.innerHTML = `<p>Error accessing model: ${error.message}</p>`;
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            checkHealth();
            getModelInfo();
        });
    </script>
</body>
</html>
